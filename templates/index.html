<body>
<header class="topbar">
  <img class="logo" src="/static/logo.png" onerror="this.style.display='none'" alt="우성공원" />
  <div class="title">비문 신청서</div>
  <div class="top-actions">
    <button class="btn" type="button" onclick="newForm()">새로작성</button>
    <button class="btn" type="button" onclick="openList()">저장목록</button>
    <button class="btn btn-primary" type="button" onclick="saveForm()">저장</button>
  </div>
</header>
<nav class="tabs">
  <button class="tab active" type="button" data-page="page1" onclick="showPage('page1')">1. 기본정보</button>
  <button class="tab" type="button" data-page="page2" onclick="showPage('page2')">2. 비문</button>
</nav>

<main class="wrap">
  <form id="mainForm" autocomplete="off">
    <input type="hidden" name="id" id="dataId" />
    <input type="hidden" name="created_at" id="createdAt" />
    <input type="hidden" name="slot_count" id="slotCount" value="1" />

    <section id="page1" class="page active">
      <div class="page1-layout">
        <div>
          <div class="section-title">기본정보</div>
          <div class="card basic-card">
            <div class="grid3">
              <div><label class="lbl">계약번호</label><input name="contract_no" id="contractNo" /></div>
              <div><label class="lbl">계약자</label><input name="contractor" id="contractor" /></div>
              <div><label class="lbl">연락처 <span class="note">시안 받으실 분</span></label><input name="phone" id="phone" maxlength="13" placeholder="010-0000-0000" /></div>
            </div>
            <div class="grid4 row-gap">
              <div><label class="lbl">대분류</label><select name="category" id="category"></select></div>
              <div><label class="lbl">소분류(세부유형)</label><select name="subcategory" id="subcategory"></select></div>
              <div class="size-wrap hidden" id="sizeWrap"><label class="lbl">크기</label><select name="size_type" id="sizeType"><option value="2.5">2.5</option><option value="3.0">3.0</option><option value="3.5">3.5</option></select></div>
              <div class="template-label"><label class="lbl">최종 시안명</label><input name="template_label" id="templateLabel" readonly /></div>
            </div>
            <div class="grid3 row-gap">
              <div><label class="lbl">지구</label><input name="jigu" id="jigu" /></div>
              <div><label class="lbl">열</label><input name="yeol" id="yeol" /></div>
              <div><label class="lbl">호</label><input name="ho" id="ho" /></div>
            </div>
          </div>
        </div>

        <div>
          <div class="section-title">작업관리</div>
          <div class="card work-card">
            <div class="work-stack">
              <div><label class="lbl">작성자</label><select name="writer" id="writer"></select></div>
              <div><label class="lbl">작업자</label><select name="designer" id="designer"></select></div>
              <div><label class="lbl">검수자</label><select name="checker" id="checker"></select></div>
              <div><label class="lbl">진행상태</label><select name="status" id="status"></select></div>
              <div class="memo-wrap"><label class="lbl">작업메모</label><textarea name="work_memo" id="workMemo" placeholder="시안 작업자가 확인해야 할 내용을 적어주세요."></textarea></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="page2" class="page">
      <div class="bimun-layout">
        <div>
          <div class="section-title">비문 입력</div>

          <div class="sub-section-title">전면</div>
          <div class="card">
            <div class="grid3" style="margin-bottom:12px">
              <div class="hidden" id="frontTypeWrap"><label class="lbl">전면 문자</label><select name="front_type" id="frontType"><option value="korean">한글</option><option value="chinese">한자</option></select></div>
              <div class="is-big"><label class="lbl">종교 마크</label><select name="religion_mark" id="religionMark"><option value="">없음</option><option>불교</option><option>기독교</option><option>천주교</option></select></div>
              <div class="is-big hidden" id="jidmyoWrap"><label class="lbl">지묘 문구</label><input name="jidmyo" id="jidmyo" placeholder="예: 지묘" /></div>

                    <div class="is-small"><label class="lbl">사망일 <span class="date-note">(음력이면 "음"글자 직접 기재)</span></label><input name="s1_death" id="s1Death" /></div>
                    <div class="is-small"><label class="lbl">사망 표현</label><select name="s1_death_type" id="s1DeathType"><option>졸</option><option>선종</option><option>소천</option><option>없음</option></select></div>
                  </div>

                    <div class="is-small"><label class="lbl">생년월일 <span class="date-note">(음력이면 "음"글자 직접 기재)</span></label><input name="s1_birth" id="s1Birth" /></div>
                    <div class="is-small"><label class="lbl">생 표현</label><select name="s1_birth_type" id="s1BirthType" onchange="sideBirthTypeChanged(1)"><option>생</option><option>없음</option></select></div>
                  </div></div>

                  <div class="is-big"><label class="lbl">본관 <span class="note">&lt;씨 자동&gt;</span></label><input name="female_bongwan" id="femaleBongwan" /></div>
                  <div class="is-big"><label class="lbl">이름</label><input name="female_name" id="femaleName" /></div>

                  <div class="grid2">
                    <div class="is-small"><label class="lbl">사망일 <span class="date-note">(음력이면 "음"글자 직접 기재)</span></label><input name="s2_death" id="s2Death" /></div>
                    <div class="is-small"><label class="lbl">사망 표현</label><select name="s2_death_type" id="s2DeathType"><option>졸</option><option>선종</option><option>소천</option><option>없음</option></select></div>
                  </div>
                  <div class="side-birth-row hidden" id="sideBirthRow2"><div class="grid2">
                    <div class="is-small"><label class="lbl">생년월일 <span class="date-note">(음력이면 "음"글자 직접 기재)</span></label><input name="s2_birth" id="s2Birth" /></div>
                    <div class="is-small"><label class="lbl">생 표현</label><select name="s2_birth_type" id="s2BirthType" onchange="sideBirthTypeChanged(2)"><option>생</option><option>없음</option></select></div>
                  </div></div>
                  <div class="birth-action"><button class="btn-add-birth" type="button" id="sideBirthBtn2" onclick="showSideBirth(2)">＋ 생년월일</button></div>
                </div>

            </div>
            <div id="standardFront">
              <div id="familyPhraseWrap" class="hidden" style="margin-bottom:10px">
                <div class="is-big"><label class="lbl">가족명/본관 <span class="note">&lt;씨 가족지묘 자동&gt;</span></label><input name="family_bongwan" id="familyBongwan" placeholder="예: 김해김 / 金海金" /></div>
              </div>

              <button class="btn small-btn" type="button" onclick="addSlot()">＋ 고인 추가</button>
            </div>
            <div id="bubuBFrontLayoutWrap" class="bubub-layout-wrap hidden">
              <label class="lbl">평장부부B 기본 전면 형태</label>
              <select name="bubub_front_layout" id="bubuBFrontLayout">
                <option value="nameOnly">성함만</option>
                <option value="full">호칭+본관+성함</option>

               전면 couple-panel(maejangFront)로 통합되어 제거됨. 측면 문자(한글/한자)

<div class="actionbar">
  <button class="btn btn-primary" type="button" onclick="saveForm()">저장</button>
  <button class="btn" type="button" onclick="openList()">저장목록</button>
  <button class="btn" type="button" onclick="window.print()">프린트</button>
  <button class="btn btn-danger" type="button" onclick="resetCurrentPage()">초기화</button>
  <span class="save-msg" id="saveMsg"></span><span class="grow"></span>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="drawer-bg" id="drawerBg" onclick="closeList()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><h2>저장목록</h2><button class="btn" type="button" onclick="closeList()">닫기</button></div>
  <div class="drawer-search"><input id="listSearch" placeholder="계약번호 / 계약자 / 유형 / 위치(지구·열·호) 검색" oninput="renderList(savedList)" /></div>
  <div class="drawer-body"><div id="listBody"></div></div>
</div>

<script>
const CATALOG = {{ catalog|tojson }};
const RULES = {{ rules|tojson }};
const STAFF = {{ staff_list|tojson }};
const STATUS = {{ status_list|tojson }};
const STONE_CATEGORIES = {{ stone_categories|tojson }};
let savedList = {{ saved_list|tojson }};
let currentSummary = null;
const $ = (id)=>document.getElementById(id);
const money = (n)=> (Number(n||0)).toLocaleString('ko-KR') + '원';
const esc = (s)=>String(s||'').replace(/[&<>\"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));

const SUBCATEGORY_LABELS = {
  '평장부부B': {
    '1번': '1번(동그란 종교마크)',
    '2번': '2번(큰오석 왼쪽에 작은오석)',
    '3번': '3번(드라큘라 모양)',
    '4번': '4번(3번이랑 비슷하나, 아래가 조금 더 넓음)'
  }
};
function getSubcategoryLabel(cat, sub){
  return (SUBCATEGORY_LABELS[cat] && SUBCATEGORY_LABELS[cat][sub]) || sub || '선택';
}
function fillSelect(el, list, selected=''){
  el.innerHTML = '';
  list.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v||'선택'; if(v===selected) o.selected=true; el.appendChild(o); });
}
function init(){
  fillSelect($('category'), Object.keys(CATALOG), '매장묘');
  fillSubcategory('단장');
  ['writer','designer','checker'].forEach(id=>fillSelect($(id), STAFF));
  fillSelect($('status'), STATUS, '접수됨');
  renderSlots(1);
  bindInputs(); updateUI(); renderList(savedList); calc();
}
function fillSubcategory(selected=''){
  const cat = $('category').value;
  const list = CATALOG[cat] || [];
  const el = $('subcategory');
  el.innerHTML = '';
  list.forEach(v=>{
    const o=document.createElement('option');
    o.value=v;
    o.textContent=getSubcategoryLabel(cat, v);
    if(v===(selected || list[0])) o.selected=true;
    el.appendChild(o);
  });
}
function ruleKey(){return $('category').value + '||' + $('subcategory').value}
function getRule(){return RULES[ruleKey()] || {slots:1,has_side:false,stone_photo:false,front_style:'standard'}}
function isMaejangFront(){ return getRule().front_style === 'maejang'; }
function isSingleMaejang(){ return $('category').value==='매장묘' && $('subcategory').value==='단장'; }
function makeTemplateLabel(){
  const cat = $('category')?.value || '';
  const sub = $('subcategory')?.value || '';
  const parts = [cat, sub].filter(Boolean);
  if(cat === '매장묘') parts.push($('sizeType')?.value || '');
  return parts.filter(Boolean).join(' / ');
}
function updateTemplateLabel(){
  const el = $('templateLabel');
  if(el) el.value = makeTemplateLabel();
}
function showPage(page){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.page===page));
  $(page).classList.add('active');
}
function renderSlots(count){
  // 송수재 개인/부부는 기본 고인 1명만 표시하고, 필요 시 고인 추가 버튼으로 추가
  const catForSlots = $('category') ? $('category').value : '';
  const subForSlots = $('subcategory') ? $('subcategory').value : '';
  const forceFourSlots = (catForSlots==='평장부부B' && ['1번','3번','4번'].includes(subForSlots)) ||
                         (catForSlots==='4기' && ['A','B','P','4기A','4기B','4기P'].includes(subForSlots)) ||
                         catForSlots==='평장4기P';
  const minSlots = forceFourSlots ? 4 : (catForSlots==='송수재' ? 1 : (getRule().slots||1));
  count=Math.max(minSlots,Math.min(10,Number(count||minSlots))); $('slotCount').value=count; let html='';
  for(let i=1;i<=count;i++){
    const canDel=count>minSlots&&i>1;
    html+=`<div class="slot-box" data-slot="${i}">
      <div class="slot-head"><span>고인 ${i}</span>${canDel?`<button class="btn small-btn" type="button" onclick="removeSlot(${i})">삭제</button>`:''}</div>
      <div class="grid2">
        <div class="is-big"><label class="lbl">이름</label><input name="f${i}_name" id="f${i}Name" /></div>
        <div class="is-big"><label class="lbl">세례명</label><input name="f${i}_baptism" id="f${i}Baptism" /></div>
      </div>
      <div class="birth-row hidden" id="birthRow${i}"><div class="grid2">
        <div class="is-small"><label class="lbl">생년월일 <span class="date-note">(음력이면 "음"글자 직접 기재)</span></label><input name="f${i}_birth" id="f${i}Birth" /></div>
        <div class="is-small"><label class="lbl">생 표현</label><select name="f${i}_birth_type" id="f${i}BirthType" onchange="birthTypeChanged(${i})"><option>생</option><option>없음</option></select></div>
      </div></div>
      <div class="grid2 death-row">
        <div class="is-small"><label class="lbl">사망일 <span class="date-note">(음력이면 "음"글자 직접 기재)</span></label><input name="f${i}_death" id="f${i}Death" /></div>
        <div class="is-small"><label class="lbl">사망 표현</label><select name="f${i}_death_type"><option>졸</option><option>선종</option><option>소천</option><option>없음</option></select></div>
      </div>

let _calcDebounceTimer=null;

}
function bindInputs(){
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.oninput=()=>{updatePreview(); debouncedCalc();};
    el.onchange=()=>{
      const m = el.id && el.id.match(/^f(\d+)BirthType$/);
      const sm = el.id && el.id.match(/^s(\d+)BirthType$/);
      if(m && el.value==='없음') birthTypeChanged(Number(m[1]));
      if(sm && el.value==='없음') sideBirthTypeChanged(Number(sm[1]));
      updateUI(); updatePreview(); debouncedCalc();

  $('subcategory').onchange=()=>{ updateUI(true); updatePreview(); calc(); };

function collectForm(){

function _isHanjaChar(ch){ const cp=(ch||'').charCodeAt(0); return (cp>=0x4E00&&cp<=0x9FFF)||(cp>=0x3400&&cp<=0x4DBF)||(cp>=0xF900&&cp<=0xFAFF); }
function _bongwanDisp(bongwan, hSuf, kSuf){
  const t=(bongwan||'').trim(); if(!t) return '';
  if(t.endsWith(hSuf)||t.endsWith(kSuf)) return esc(t);
  return esc(t+(_isHanjaChar(t[t.length-1])?hSuf:kSuf));
}
function _getLayoutType(){
  const cat=$('category').value, sub=$('subcategory').value;
  // 평장부부B 1/3/4는 RULES가 maejang 계열이어도 전면/후면을 별도 처리한다. 매장묘는 건드리지 않음.
  if(cat==='평장부부B' && ['1번','3번','4번'].includes(sub)) return 'couple_tb';
  if(isMaejangFront()) return 'vertical_burial';           // 매장묘, 평장부부B 2번

  // 가족형은 getRule().family_phrase보다 먼저 분기해야 실제 요청 레이아웃이 적용됨
  if(cat==='8기') return 'family_8';
  if(cat==='12기A' || cat==='20기' || cat==='30기' || (cat==='다기형' && ['12A','12기A','20기','30기'].includes(sub))) return 'family_front_back_vertical';
  if(cat==='12기B') return 'family_vertical_back_horizontal';
  if(cat==='24기') return 'family_24';

  if(getRule().family_phrase) return 'family_phrase';
  if(cat==='송수재' && sub==='개인') return 'songsujae_single';
  if(cat==='송수재' && sub==='부부') return 'songsujae_couple';
  if(cat==='평장1기P') return 'pyeongjang1p';
  if(cat==='4기' && (['A','B','P'].includes(sub) || ['4기A','4기B','4기P'].includes(sub))) return 'four_abp';
  if(cat==='4기' && (['C','R'].includes(sub) || ['4기C','4기R'].includes(sub))) return 'four_vertical';
  if(['단납/평장1기'].includes(cat)) return 'single_hoz';  // 1인형
  if(cat==='쌍납/평장부부A') return 'couple_lr';            // 좌우형
  if(['부부A','납골정','평장부부B','평장부부P'].includes(cat)) return 'couple_tb';    // 상하형
  if(cat==='평장4기P') return 'pyeong4p';
  if(cat==='평장4기') return 'pyeong4';
  if(['4기'].includes(cat)) return 'multi_person';
  return 'single_hoz';
}

function _renderBack(d){

  }
  const r1=[rField('자',d.son_text),rField('자부',d.daughter_in_law_text),rField('손',d.grandson_text)].filter(Boolean);

function _dateCharsDisplay(birth, btype, death, dtype){

  // 점(.)은 앞 숫자 바로 아래에 붙이고, 다음 숫자와는 약간 띄운다.
  function renderChars(text){
    return [...String(text||'').replace(/\s+/g,'')].map(c=>{
      const cls = c==='.' ? 'pv-date-dot' : 'pv-date-char';
      return `<div class="${cls}">${esc(c)}</div>`;

  let html='';
  if(birth){
    html+=renderChars(birth);
    if(btype&&btype!=='없음') html+='<div class="pv-date-type-gap"></div>'+renderChars(btype);
  }
  if(death){

function _renderBackBurial(d){
  // 매장묘/평장부부B 2번/부부A 후면: 사람 1명 = 고정폭 세로 1열.
  // 글자 크기를 키워도 column 폭/줄간격은 px로 고정되어 간격이 뒤틀리지 않는다.
  function field(lbl, val){
    const raw=String(val||'').replace(/\r/g,'');
    if(!/\S/.test(raw)) return '';
    const names=raw.split('\n').filter(l=>/\S/.test(l));
    const lblHtml=[...lbl].map(c=>`<div>${esc(c)}</div>`).join('');
    const nameCols=names.map(name=>{
      const chars=[...name].map(c=>`<span class="pv-bb-person-char">${c===' ' ? '&nbsp;' : esc(c)}</span>`).join('');
      return `<div class="pv-bb-person-col">${chars}</div>`;
    }).join('');
    return `<div class="pv-bb-field"><div class="pv-bb-label-chars">${lblHtml}</div><div class="pv-bb-name-gap"></div><div class="pv-bb-name-row">${nameCols}</div></div>`;
  }
  // 4열 그리드, DOM 순서(좌→우): 사위 녀 자부 자 / empty 외손 empty 손
  // justify-content:end → 오른쪽 정렬, 시각 우→좌: 자 자부 녀 사위 / 손 . 외손 .
  const silF=field('사위',d.son_in_law_text);
  const daughterF=field('녀',d.daughter_text);
  const dilF=field('자부',d.daughter_in_law_text);
  const sonF=field('자',d.son_text);
  const mgcF=field('외손',d.maternal_grandchild_text);
  const grandsonF=field('손',d.grandson_text);
  const etc=String(d.etc_text||'').replace(/\r/g,'');
  if(!silF&&!daughterF&&!dilF&&!sonF&&!mgcF&&!grandsonF&&!/\S/.test(etc)) return '';
  let html=`<div class="pv-bb-desc-grid">`;
  html+=`<div class="pv-bb-col-cell">${silF}</div>`;
  html+=`<div class="pv-bb-col-cell">${daughterF}</div>`;
  html+=`<div class="pv-bb-col-cell">${dilF}</div>`;
  html+=`<div class="pv-bb-col-cell">${sonF}</div>`;
  html+=`<div class="pv-bb-col-cell"></div>`;
  html+=`<div class="pv-bb-col-cell">${mgcF}</div>`;
  html+=`<div class="pv-bb-col-cell"></div>`;
  html+=`<div class="pv-bb-col-cell">${grandsonF}</div>`;
  html+=`</div>`;
  if(/\S/.test(etc)) html+=`<div class="pv-bb-row"><div class="pv-bb-etc">${esc(etc)}</div></div>`;

function _renderBackBurialR(d){
  // 4기 R 전용: 매장묘 후면 렌더 방식을 복사해서 쓰되, 매장묘 함수는 절대 변경하지 않음.
  // 요청 순서: < 외손 손 사위 녀 자부 자 > 한 줄
  function field(lbl, val){
    const raw=String(val||'').replace(/\r/g,'');
    if(!/\S/.test(raw)) return '';
    const names=raw.split('\n').filter(l=>/\S/.test(l));
    const nameCols=names.map(name=>`<div class="pv-bb-person-col">${[...name.trim()].map(c=>`<span class="pv-bb-person-char">${esc(c)}</span>`).join('')}</div>`).join('');
    const lblHtml=[...lbl].map(c=>`<div>${esc(c)}</div>`).join('');
    return `<div class="pv-bb-field"><div class="pv-bb-label-chars">${lblHtml}</div><div class="pv-bb-name-gap"></div><div class="pv-bb-name-row">${nameCols}</div></div>`;
  }
  const mgcF=field('외손',d.maternal_grandchild_text);
  const grandsonF=field('손',d.grandson_text);
  const silF=field('사위',d.son_in_law_text);
  const daughterF=field('녀',d.daughter_text);
  const dilF=field('자부',d.daughter_in_law_text);
  const sonF=field('자',d.son_text);
  const etc=String(d.etc_text||'').replace(/\r/g,'');
  if(!sonF&&!dilF&&!daughterF&&!silF&&!mgcF&&!grandsonF&&!/\S/.test(etc)) return '';
  let html='<div class="pv-back-r-grid">';
  html+=`<div class="pv-bb-col-cell">${mgcF}</div>`;
  html+=`<div class="pv-bb-col-cell">${grandsonF}</div>`;
  html+=`<div class="pv-bb-col-cell">${silF}</div>`;
  html+=`<div class="pv-bb-col-cell">${daughterF}</div>`;
  html+=`<div class="pv-bb-col-cell">${dilF}</div>`;
  html+=`<div class="pv-bb-col-cell">${sonF}</div>`;
  html+='</div>';
  if(/\S/.test(etc)) html+=`<div class="pv-bb-row"><div class="pv-bb-etc">${esc(etc)}</div></div>`;
  return `<div class="pv-burial-back">${html}</div>`;
}

function updatePreview(){
  const d=collectForm();
  const ri=$('pvReligionImg'); if(ri) ri.style.display='none';
  const lt=_getLayoutType(), rel=d.religion_mark||'', back=_renderBack(d);
  $('pvDates').innerHTML='';

  if(lt==='vertical_burial'){
    // 매장묘/평장부부B 2번: 글자별 세로 날짜 + 세로이름 + 지묘
    const mt=d.male_title||'', ft=d.female_title||'';
    const mb=_bongwanDisp(d.male_bongwan,'公','공');
    const fb=_bongwanDisp(d.female_bongwan,'氏','씨');
    const mParts=[(mt&&mt!=='없음'?esc(mt):''),mb,esc(d.male_name||'')].filter(Boolean);

    const s2Col=s2?`<div class="pv-burial-side-chars">${s2}</div>`:'';

    if(isSingleMaejang()){
      // 매장묘 단장: 종교마크/호칭/본관/이름/지묘를 중앙 한 축으로 정렬
      const mainCol=mParts.length?`<div class="pv-burial-name-col"><div class="pv-name-vt">${mParts.join('')}</div></div>`:'';

          <div class="pv-burial-single-main">${_relHtml(rel,72)}${mainCol}${jv?`<div class="pv-jidmyo-vt">${esc(jv)}</div>`:''}</div>
        </div>`;
    }else{

      const fCol=fParts.length?`<div class="pv-burial-name-col"><div class="pv-name-vt">${fParts.join('')}</div></div>`:'';
      // 쌍분: 불교마크/지묘는 중앙 고정. 한쪽만 입력된 경우 해당 성별 자리로 더 벌려 배치한다.
      const hasM = mParts.length > 0;

      $('pvNames').innerHTML=`
        ${_relHtml(rel,72)}

          ${s1Col || '<div></div>'}
          ${mCol || '<div></div>'}
          ${fCol || '<div></div>'}
          ${s2Col || '<div></div>'}

    }

  } else if(lt==='family_phrase'){

    $('pvNames').innerHTML=`${_relHtml(rel,48)}<div class="pv-family-phrase">${esc(display)} 가족지묘</div>`;
    $('pvBack').innerHTML=`${slots?`<div class="pv-multi-grid" style="margin-bottom:8px">${slots}</div>`:''}${back}`;

  } else if(lt==='family_8'){
    $('pvNames').innerHTML=_renderEightFamilyFront(d);

  } else if(lt==='family_front_back_vertical'){

  } else if(lt==='family_24'){

  } else if(lt==='pyeongjang1p'){

    $('pvBack').innerHTML=_renderBackSongSujae(d);

  } else if(lt==='pyeong4p'){
    $('pvNames').innerHTML=_renderPyeong4PFront(d);
    $('pvDates').innerHTML='';
    $('pvBack').innerHTML=_renderBackSongSujae(d);

  } else if(lt==='pyeong4'){
    $('pvNames').innerHTML=_renderPyeong4Front(d);
    $('pvDates').innerHTML='';
    // 평장4기 기본 후면은 평장1기/단납과 동일
    $('pvBack').innerHTML=_renderBackSingle3col(d);

  } else if(lt==='four_abp'){
    $('pvNames').innerHTML=_renderFourABPFront(d);
    $('pvDates').innerHTML='';
    if(d.category==='4기' && (['A','B','4기A','4기B'].includes(d.subcategory))) $('pvBack').innerHTML=_renderBackBurial(d);
    else $('pvBack').innerHTML=_renderBackSongSujae(d);

  } else if(lt==='four_vertical'){
    $('pvNames').innerHTML=_renderFourVerticalFront(d);
    $('pvDates').innerHTML='';
    $('pvBack').innerHTML=(d.category==='4기' && ['R','4기R'].includes(d.subcategory)) ? _renderBackBurialR(d) : _renderBackSingle3col(d);

  } else if(lt==='songsujae_single'){
    // 송수재 개인: 종교마크는 이름 앞, 세례명은 이름 왼쪽 상단, 날짜는 평장1기/단납과 동일
    const nm=d.f1_name||'', bp=d.f1_baptism||'';
    const dt=_dateLine(d.f1_birth,d.f1_birth_type,d.f1_death,d.f1_death_type);
    const nameBox=`<div class="pv-song-namebox">${bp?`<div class="pv-baptism">${esc(bp)}</div>`:''}${nm?`<div class="pv-name-lg">${esc(nm)}</div>`:'<span style="opacity:.3">성명</span>'}</div>`;
    $('pvNames').innerHTML=`<div class="pv-song-front"><div class="pv-song-main song-single"><div class="pv-song-religion-left">${_relHtml(rel,48)}</div>${nameBox}</div></div>`;
    $('pvDates').innerHTML=dt?`<div class="pv-song-dates">${dt}</div>`:'';
    $('pvBack').innerHTML=_renderBackSongSujae(d);

  } else if(lt==='songsujae_couple'){
    // 송수재 부부: 종교마크는 상단 중앙. 스톤포토 추가 시 왼쪽 사진 박스 + 오른쪽 이름 영역
    const nm=d.f1_name||'', bp=d.f1_baptism||'';
    const dt=_dateLine(d.f1_birth,d.f1_birth_type,d.f1_death,d.f1_death_type);
    const nameBox=`<div class="pv-song-namebox">${bp?`<div class="pv-baptism">${esc(bp)}</div>`:''}${nm?`<div class="pv-name-lg">${esc(nm)}</div>`:'<span style="opacity:.3">성명</span>'}</div>`;
    const content=`<div class="pv-song-main song-couple"><div class="pv-song-religion-top">${_relHtml(rel,48)}</div>${nameBox}</div>`;
    const stoneOn = stonePhotoCountFromData(d) > 0;
    $('pvNames').innerHTML= stoneOn
      ? `<div class="pv-song-stone-front"><div class="pv-song-photo-box"></div>${content}</div>`
      : `<div class="pv-song-front">${content}</div>`;
    $('pvDates').innerHTML=dt?`<div class="pv-song-dates">${dt}</div>`:'';
    $('pvBack').innerHTML=_renderBackSongSujae(d);

  } else if(lt==='single_hoz'){
    // 1인형: 이름 가로 크게 (세로쓰기 금지)
    const nm=d.f1_name||'',bp=d.f1_baptism||'';
    const dt=_dateLine(d.f1_birth,d.f1_birth_type,d.f1_death,d.f1_death_type);
    const stoneOn = isSlotStoneOn(d,1) || stonePhotoCountFromData(d) > 0;
    const mainName = `${_relHtml(rel,52)}${(nm||bp)?_personHoz(nm,bp,''):'<span style="opacity:.3">성명</span>'}`;
    $('pvNames').innerHTML = stoneOn
      ? `<div class="pv-single-stone-front"><div class="pv-song-photo-box"></div><div class="pv-single-stone-main">${mainName}</div></div>`
      : mainName;
    $('pvDates').innerHTML=dt?`<div class="pv-dates-hoz">${dt}</div>`:'';
    $('pvBack').innerHTML=_renderBackSingle3col(d)||back;

  } else if(lt==='couple_lr'){
    // 좌우형 (쌍납/평장부부A): 2인 가로 나란히
    const cnt=Math.min(Number(d.slot_count||1),2); let persons='';
    for(let i=1;i<=cnt;i++){
      const nm=d['f'+i+'_name']||'',bp=d['f'+i+'_baptism']||'';
      const dt=_dateLine(d['f'+i+'_birth'],d['f'+i+'_birth_type'],d['f'+i+'_death'],d['f'+i+'_death_type']);
      const personClass = i === 1 ? 'couple-lr-male' : 'couple-lr-female';
      const nameBox = (nm||bp)
        ? `<div class="pv-couple-namebox">${bp?`<div class="pv-baptism">${esc(bp)}</div>`:''}${nm?`<div class="pv-name-lg">${esc(nm)}</div>`:'<span style="opacity:.3">성명</span>'}</div>`
        : '<span style="opacity:.3">성명</span>';
      persons+=`<div class="pv-person ${personClass}">${nameBox}<div class="pv-date-sm">${dt}</div></div>`;
    }
    $('pvNames').innerHTML=`${_relHtml(rel,44)}<div class="pv-names-row couple-lr-row">${persons}</div>`;
    // 쌍납/평장부부A 후면 자손은 평장1기/단납과 동일 구조 사용
    $('pvBack').innerHTML=_renderBackSingle3col(d)||back;

  } else if(lt==='couple_tb'){
    // 상하형 (부부A/납골정/평장부부B/P): 2인 위아래
    if(d.category === '평장부부B' && d.subcategory === '기본'){
      $('pvNames').innerHTML = _renderBubuBDefaultFront(d);
      $('pvDates').innerHTML = '';
      // 평장부부B 기본 후면은 평장1기/단납과 동일
      $('pvBack').innerHTML = _renderBackSingle3col(d);
      return;
    }
    if(d.category === '평장부부B' && ['1번','3번','4번'].includes(d.subcategory)){
      $('pvNames').innerHTML = _renderBubuB134Front(d);
      $('pvDates').innerHTML = '';
      $('pvBack').innerHTML = _renderBackBurial(d);
      return;
    }
    const cnt=Math.min(Number(d.slot_count||1),2); let persons='';
    for(let i=1;i<=cnt;i++){
      const nm=d['f'+i+'_name']||'',bp=d['f'+i+'_baptism']||'';
      const bpHtml=bp?`<div class="pv-baptism">${esc(bp)}</div>`:'';
      const dt=_dateLine(d['f'+i+'_birth'],d['f'+i+'_birth_type'],d['f'+i+'_death'],d['f'+i+'_death_type']);
      persons+=`<div class="pv-tb-person">${bpHtml}${nm?`<div class="pv-name-lg">${esc(nm)}</div>`:'<span style="opacity:.3">성명</span>'}<div class="pv-date-sm">${dt}</div></div>`;
    }
    $('pvNames').innerHTML=`${_relHtml(rel,44)}<div class="pv-tb-stack">${persons}</div>`;
    // 부부A 후면(자손)은 매장묘 후면과 동일한 방식으로 출력
    // 납골정 후면(자손)은 송수재 개인 후면과 동일한 방식으로 출력
    // 전면 구조 및 기존 계산/저장/불러오기/프린트는 변경하지 않음
    $('pvBack').innerHTML = (d.category === '부부A')
      ? _renderBackBubuAOnly(d)
      : (d.category === '납골정' ? _renderBackSongSujae(d) : back);

  } else {
    // multi_person (4기, 평장4기 등)
    const cnt=Number(d.slot_count||1); let slots='';
    for(let i=1;i<=cnt;i++){
      const nm=d['f'+i+'_name']||'',bp=d['f'+i+'_baptism']||'';
      const bpHtml=bp?`<div style="font-size:.58rem;color:#bbb;margin-bottom:1px">${esc(bp)}</div>`:'';
      const dt=_dateLine(d['f'+i+'_birth'],d['f'+i+'_birth_type'],d['f'+i+'_death'],d['f'+i+'_death_type']);
      slots+=`<div class="pv-multi-slot">${bpHtml}${nm?`<div class="pv-name-md">${esc(nm)}</div>`:''}<div class="pv-date-xs">${dt}</div></div>`;
    }
    $('pvNames').innerHTML=`${_relHtml(rel,36)}<div class="pv-multi-grid">${slots}</div>`;
    $('pvBack').innerHTML=back;
  }
}
async function calc(){
  const res=await fetch('/api/calc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(collectForm())}); currentSummary=await res.json();
  const s=currentSummary;
  const smallTotalCnt=(s.small_korean_cnt||0)+(s.small_hanja_cnt||0);
  const smallTotalAmt=(s.small_korean_amt||0)+(s.small_hanja_amt||0);
  let rows='';
  if(s.big_korean_cnt) rows+=`<div class="calc-row"><span class="calc-label">큰글자 한글</span><span class="calc-value">${s.big_korean_cnt}자 × ${s.big_korean_unit.toLocaleString('ko-KR')}원 = ${money(s.big_korean_amt)}</span></div>`;
  if(s.big_hanja_cnt)  rows+=`<div class="calc-row"><span class="calc-label">큰글자 한자</span><span class="calc-value">${s.big_hanja_cnt}자 × ${s.big_hanja_unit.toLocaleString('ko-KR')}원 = ${money(s.big_hanja_amt)}</span></div>`;
  if(!s.big_korean_cnt && !s.big_hanja_cnt) rows+=`<div class="calc-row"><span class="calc-label">큰글자</span><span class="calc-value">0자</span></div>`;
  if(s.small_korean_cnt) rows+=`<div class="calc-row"><span class="calc-label">작은글자 한글</span><span class="calc-value">${s.small_korean_cnt}자 × ${s.small_korean_unit.toLocaleString('ko-KR')}원 = ${money(s.small_korean_amt)}</span></div>`;
  if(s.small_hanja_cnt)  rows+=`<div class="calc-row"><span class="calc-label">작은글자 한자</span><span class="calc-value">${s.small_hanja_cnt}자 × ${s.small_hanja_unit.toLocaleString('ko-KR')}원 = ${money(s.small_hanja_amt)}</span></div>`;
  if(s.stone_added) rows+=`<div class="calc-row"><span class="calc-label">스톤포토</span><span class="calc-value">${s.stone_count||1}개 × ${money(s.stone_unit||120000)} = ${money(s.stone_amt)}</span></div>`;
  $('summaryBox').innerHTML=`
    <div class="calc-lines">
      ${rows}
      <div class="calc-total-line">총 금액 : ${money(s.total)}</div>
    </div>
    <div class="calc-chips">
      <div class="calc-chip calc-chip-big"><span>大 큰글씨</span><strong>${s.big_cnt}자 / ${money(s.big_amt)}</strong></div>
      <div class="calc-chip calc-chip-small"><span>小 작은글씨</span><strong>${smallTotalCnt}자 / ${money(smallTotalAmt)}</strong></div>
      ${s.stone_added ? `<div class="calc-chip calc-chip-stone"><span>스톤포토 ${s.stone_count||1}개</span><strong>${money(s.stone_amt)}</strong></div>` : ''}
      <div class="calc-chip calc-chip-total"><span>최종 합계</span><strong>${money(s.total)}</strong></div>
    </div>`;
}
async function saveForm(){
  await calc(); const data=collectForm(); const res=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); const out=await res.json();
  if(out.ok){ $('dataId').value=out.id; if(!$('createdAt').value) $('createdAt').value=out.item.created_at; showToast('저장 완료'); await refreshList(); } else showToast('저장 실패', 'error');
}
async function refreshList(){ const r=await fetch('/api/list'); savedList=await r.json(); renderList(savedList); }
function locationLabel(item){
  const parts=[item.jigu&&(item.jigu+'지구'), item.yeol&&(item.yeol+'열'), item.ho&&(item.ho+'호')].filter(Boolean);
  return parts.join(' ');
}
function draftSection(item){
  if(item.draft_url){
    return `<div class="saved-draft">
      <a href="${esc(item.draft_url)}" target="_blank" rel="noopener"><img class="draft-thumb" src="${esc(item.draft_url)}" alt="시안" /></a>
      <span class="chip-mini" style="background:#ebf2ea;border-color:#c8e0cc;color:#3a6b43">📎 시안 업로드됨</span>
      <label class="draft-upload">교체<input type="file" accept="image/jpeg,image/png,image/webp" hidden onchange="uploadDraft('${item.id}', this)" /></label>
      <button class="btn small-btn btn-danger" onclick="deleteDraft('${item.id}')">제거</button>
    </div>`;
  }
  return `<div class="saved-draft">
    <label class="draft-upload">📎 사인프로 시안 업로드<input type="file" accept="image/jpeg,image/png,image/webp" hidden onchange="uploadDraft('${item.id}', this)" /></label>
  </div>`;
}
async function uploadDraft(id, input){
  const file=input.files&&input.files[0]; if(!file) return;
  const fd=new FormData(); fd.append('file', file);
  input.disabled=true;
  try{
    const r=await fetch('/api/draft/'+id, {method:'POST', body:fd});
    const out=await r.json();
    if(out.ok){ await refreshList(); }
    else { showToast('업로드 실패: '+(out.error||'unknown'), 'error'); }
  }catch(e){ showToast('업로드 실패: '+e.message, 'error'); }
  finally{ input.disabled=false; input.value=''; }
}
async function deleteDraft(id){
  if(!confirm('업로드된 시안을 제거할까요?')) return;
  const r=await fetch('/api/draft/'+id, {method:'DELETE'});
  const out=await r.json();
  if(out.ok) { refreshList(); showToast('시안 제거 완료'); } else showToast('제거 실패: '+(out.error||''), 'error');
}
function renderList(list){
  const q=($('listSearch')?.value||'').trim().toLowerCase(); const filtered=(list||[]).filter(item=>!q || [item.contract_no,item.contractor,item.type_label,item.status,item.writer,item.designer,item.checker,item.jigu,item.yeol,item.ho,locationLabel(item)].join(' ').toLowerCase().includes(q));
  $('listBody').innerHTML = filtered.map(item=>{
    const staffChips=[item.writer&&`<span class="chip-staff">작성: ${esc(item.writer)}</span>`,item.designer&&`<span class="chip-staff">작업: ${esc(item.designer)}</span>`,item.checker&&`<span class="chip-staff">검수: ${esc(item.checker)}</span>`].filter(Boolean).join('');
    return `<div class="saved-card">
    <div class="saved-card-top"></div><div class="saved-card-body">
      <div class="saved-title"><span>${esc(item.contract_no ? '#'+item.contract_no : '계약번호 없음')}</span><span>${esc(item.contractor||'계약자 없음')}</span><span class="saved-time">${esc(item.created_at)}</span></div>
      <div class="saved-sub" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px"><span>${esc(item.type_label)}</span>${locationLabel(item)?`<span class="chip-mini" style="background:#eef2d2;border-color:#c8d094;color:#5d6b20">📍 ${esc(locationLabel(item))}</span>`:''}${staffChips}</div>
      <div class="saved-chips"><span class="chip-mini">큰글자 ${money(item.big_amt)}</span><span class="chip-mini">작은글자 ${money(item.small_amt)}</span>${String(item.stone_photo||'').startsWith('추가')?`<span class="chip-mini chip-stone-red">${esc(item.stone_photo)}</span>`:''}<span class="saved-amount">${money(item.total)}</span> <button class="btn small-btn btn-send" onclick="markSent('${item.id}')">시안문자발송</button></div>
      ${draftSection(item)}
    </div><div class="saved-actions"><button class="btn small-btn load-btn" onclick="loadItem('${item.id}')">불러오기</button><button class="btn small-btn del-btn" onclick="deleteItem('${item.id}')">삭제</button></div>
  </div>`;}).join('') || `<div class="saved-card"><div class="saved-card-body" style="text-align:center;color:#9a816d">저장된 신청서가 없습니다.</div></div>`;
}
async function markSent(id){
  const r=await fetch('/api/load/'+id); const out=await r.json(); if(!out.ok) return;
  out.data.status='시안문자발송';
  await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(out.data)});
  refreshList();
}
function openList(){ refreshList(); $('drawerBg').classList.add('open'); $('drawer').classList.add('open'); }
function closeList(){ $('drawerBg').classList.remove('open'); $('drawer').classList.remove('open'); }
async function loadItem(id){ const r=await fetch('/api/load/'+id); const out=await r.json(); if(out.ok){ fillForm(out.data); closeList(); showPage('page1'); } }
async function deleteItem(id){ if(!confirm('삭제할까요?')) return; await fetch('/api/delete/'+id,{method:'POST'}); refreshList(); }
function newForm(){ if(confirm('전체 새로 작성할까요? 모든 입력 내용이 지워집니다.')) location.reload(); }
function resetCurrentPage(){
  const pg=document.querySelector('.page.active')?.id;
  if(!confirm('현재 페이지 입력을 초기화할까요?')) return;
  if(pg==='page1'){
    ['contractNo','contractor','phone','jigu','yeol','ho'].forEach(id=>{const el=$(id);if(el)el.value='';});
    const cat=$('category');if(cat){cat.value='매장묘';fillSubcategory('단장');}
    ['writer','designer','checker'].forEach(id=>{const el=$(id);if(el)el.selectedIndex=0;});
    const st=$('status');if(st)st.value='접수됨';
    const wm=$('workMemo');if(wm)wm.value='';
    updateTemplateLabel();
  } else if(pg==='page2'){
    const rm=$('religionMark');if(rm)rm.value='';
    const ft=$('frontType');if(ft)ft.value='korean';
    const sdt=$('sideType');if(sdt)sdt.value='korean';
    const bt=$('backType');if(bt)bt.value='korean';
    ['maleTitle','maleBongwan','maleName','femaleTitle','femaleBongwan','femaleName','jidmyo','familyBongwan'].forEach(id=>{const el=$(id);if(el)el.value='';});
    ['s1Birth','s1Death','s2Birth','s2Death'].forEach(id=>{const el=$(id);if(el)el.value='';});
    ['son_text','daughter_in_law_text','grandson_text','daughter_text','son_in_law_text','maternal_grandchild_text','etc_text'].forEach(n=>{const el=document.querySelector('[name="'+n+'"]');if(el)el.value='';});
    const sp=$('stonePhoto');if(sp)sp.checked=false;
    renderSlots(getRule().slots||1);
    updateUI(); updatePreview(); calc();
  }
}

// 📞 연락처 자동 하이픈
function formatPhoneNumber(value){
  const num = String(value || '').replace(/\D/g, '').slice(0, 11);
  if(num.length <= 3) return num;
  if(num.length <= 7) return num.slice(0, 3) + '-' + num.slice(3);
  return num.slice(0, 3) + '-' + num.slice(3, 7) + '-' + num.slice(7, 11);
}
function bindPhoneAutoHyphen(){
  const phoneInput = document.getElementById('phone');
  if(!phoneInput) return;
  phoneInput.setAttribute('maxlength', '13');
  phoneInput.addEventListener('input', function(e){
    e.target.value = formatPhoneNumber(e.target.value);
  });
  phoneInput.addEventListener('blur', function(e){
    e.target.value = formatPhoneNumber(e.target.value);
  });
}
bindPhoneAutoHyphen();

init();
</script>
